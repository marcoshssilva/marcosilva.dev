kind: pipeline
spec:
  stages:
  - type: ci
    spec:
      steps:
      - name: 'call_npm_install'
        type: run
        spec:
          container: node:24
          script: |-
            npm install --force
      - name: 'call_npm_tests'
        type: run
        spec:
          container: node:24
          script: |-
            npm run lint
            npm run test
      - name: 'call_npm_build'
        type: run
        spec:
          container: node:20
          script: |-
            npm run build
